<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Virtual Menus AR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <style>
      /* RESET DE PANTALLA: Obliga a que el menú ocupe todo el alto vertical */
      body { margin: 0; padding: 0; overflow: hidden; background: #000; width: 100vw; height: 100vh; }
      #unity-container { width: 100%; height: 100%; position: absolute; }
      #unity-canvas { width: 100% !important; height: 100% !important; background: #231F20; }
      
      /* AJUSTE DEL SPLASH SCREEN: Para que el logo no se vea diminuto */
      #unity-loading-bar { position: absolute; left: 50%; top: 70%; transform: translate(-50%, -50%); width: 70%; display: none; }
      #unity-logo { width: 180px; height: 180px; background: url('TemplateData/unity-logo-dark.png') no-repeat center; background-size: contain; margin-bottom: 20px; }
      #unity-progress-bar-empty { width: 100%; height: 12px; background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
      #unity-progress-bar-full { width: 0%; height: 100%; background: #fff; border-radius: 10px; }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" data-pixel-ratio="2"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
    </div>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/virtual-menus-web.loader.js";
      var config = {
        dataUrl: buildUrl + "/virtual-menus-web.data",
        frameworkUrl: buildUrl + "/virtual-menus-web.framework.js",
        codeUrl: buildUrl + "/virtual-menus-web.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Virtual Menus",
        productName: "AR Experience",
        productVersion: "1.0",
      };

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
