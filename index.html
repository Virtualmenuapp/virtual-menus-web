<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://www.gstatic.com https://aframe.io blob:; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; connect-src 'self' https: blob: data:; worker-src 'self' blob:;">
    
    <title>VirtualMenus_App</title>

    <style>
      body { padding: 0; margin: 0; overflow: hidden; background-color: transparent; }
      #unity-container { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
      #unity-canvas { width: 100% !important; height: 100% !important; background: transparent !important; }
      #unity-loading-bar { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
      #unity-logo { width: 154px; height: 130px; background: url('SplashVirtualMenus.jpg') no-repeat center; background-size: contain; margin: 0 auto; }
      #unity-progress-bar-empty { width: 141px; height: 18px; margin-top: 10px; background: rgba(255, 255, 255, 0.2); border-radius: 10px; overflow: hidden; }
      #unity-progress-bar-full { width: 0%; height: 100%; background: #00aaff; transition: width 0.3s; }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
        <p style="color: white; text-align: center; font-family: sans-serif;">Cargando Experiencia...</p>
      </div>
    </div>

    <script src="Build/virtual-menus-web.loader.js?v=0.1"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");

      var config = {
        dataUrl: "Build/virtual-menus-web.data?v=0.1",
        frameworkUrl: "Build/virtual-menus-web.framework.js?v=0.1",
        codeUrl: "Build/virtual-menus-web.wasm?v=0.1",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Virtual_Menus",
        productName: "VirtualMenus_App",
        productVersion: "0.1",
      };

      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = 100 * progress + "%";
      }).then((unityInstance) => {
        loadingBar.style.display = "none";
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
