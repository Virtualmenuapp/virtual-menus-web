<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>VirtualMenus_App</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    
    <style>
      /* AJUSTES CRÍTICOS PARA MÓVIL */
      body { padding: 0; margin: 0; overflow: hidden; }
      #unity-container { width: 100% !important; height: 100% !important; background: #000; }
      #unity-canvas { width: 100% !important; height: 100% !important; touch-action: none; }
      
      /* LOGO RESPONSIVE (60% del ancho de pantalla) */
      #unity-logo { 
        width: 60vw !important; 
        max-width: 450px !important; 
        height: auto !important; 
      }

      /* BARRA DE CARGA RESPONSIVE (80% del ancho) */
      #unity-loading-bar { 
        width: 80% !important; 
        left: 50% !important; 
        transform: translateX(-50%) !important;
        bottom: 15% !important; 
        display: block !important;
      }

      #unity-progress-bar-empty { 
        width: 100% !important; 
        height: 12px !important; 
        background: rgba(255, 255, 255, 0.15) !important;
        border-radius: 10px !important;
      }

      #unity-progress-bar-full { 
        background: #ffffff !important; 
        border-radius: 10px !important;
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/virtual-menus-web.loader.js";
      var config = {
        dataUrl: buildUrl + "/virtual-menus-web.data",
        frameworkUrl: buildUrl + "/virtual-menus-web.framework.js",
        codeUrl: buildUrl + "/virtual-menus-web.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Virtual_Menus",
        productName: "VirtualMenus_App",
        productVersion: "0.1",
        showBanner: unityShowBanner,
      };

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
